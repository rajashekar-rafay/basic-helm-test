# Default values for busybox.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
namespace: rj-testing-ns
createNamespace: true
replicaCount: 1
tolerations:
  - operator: "Exists"
image:
  repository: busybox
  tag: latest
  pullPolicy: IfNotPresent
service:
  name: busybox
  type: ClusterIP
  externalPort: 80
  internalPort: 8080
resources:
  limits:
    cpu: 100m
    memory: 100Mi
  requests:
    cpu: 100m
    memory: 100Mi
